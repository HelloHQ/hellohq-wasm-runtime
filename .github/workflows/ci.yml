name: CI

# Test + lint gate on every push to main and every PR. Complements release.yml
# (which only builds + publishes the native libs on a tag). Runs the unit tests
# (src/lib.rs) and the C-ABI integration tests (tests/c_abi.rs) on all three
# desktop OSes, plus a no-default-features pass that proves the iOS no-JIT
# (Pulley-only, no Cranelift) build links and its ungated tests pass.
#
# The build-ios / build-android jobs are compile-only cross-build checks (no
# device/emulator needed): they catch per-push cross-compile breakage on the
# mobile target triples that otherwise wouldn't surface until a release tag.
# They mirror scripts/build-release.sh — iOS = --no-default-features (Pulley, no
# JIT); Android = default features (Cranelift) via cargo-ndk. Actual on-device
# execution lives in the ios-bench harness, not in per-commit CI (Pulley is a
# portable interpreter, so host execution in the test jobs is representative).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Default features (compile): unit + integration tests, incl. Cranelift,
      # Component Model, async, and the precompile → run-precompiled path.
      - name: Unit + integration tests (default features)
        run: cargo test --all-targets --locked

      # iOS no-JIT path: build runtime + Pulley only (no Cranelift / wat). Scoped
      # to --lib --tests because the examples are desktop tooling that needs the
      # compiler (Module::new / precompile). The compile-gated tests compile out;
      # the rest must still pass, proving the shipped iOS library links + its ABI.
      - name: No-JIT build + tests (--no-default-features)
        run: cargo test --no-default-features --lib --tests --locked

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --locked -- -D warnings

  build-ios:
    name: Cross-build · iOS (no-JIT)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      # arm64 only: iOS devices + the App Store are always arm64, and we develop
      # on Apple Silicon, so the Intel-Mac simulator slice (x86_64-apple-ios) is
      # not built. Device + Apple-Silicon simulator cover everything we ship/run.
      - name: Add iOS targets (device + Apple-Silicon simulator)
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim
      # The shipped iOS runtime is Pulley-only (no Cranelift), so each slice
      # builds with --no-default-features. Compile + link only — no execution.
      - name: Cross-build iOS slices (Pulley, no JIT)
        run: |
          for target in aarch64-apple-ios aarch64-apple-ios-sim; do
            echo "::group::$target"
            cargo build --no-default-features --target "$target" --locked
            echo "::endgroup::"
          done

  build-android:
    name: Cross-build · Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Add Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Resolve NDK path
        run: echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_ROOT:-$ANDROID_NDK_HOME}}" >> "$GITHUB_ENV"
      # Mirrors build-release.sh: Android ships default features (Cranelift).
      # Compile + link the three ABIs only — no jniLibs staging, no execution.
      - name: Cross-build jniLibs (default features / Cranelift)
        run: cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 build --locked
